<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טופס דינמי</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #tally-iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="tally-iframe"></iframe>

    <script>
        // 1. קבלת המידע מה-URL (למשל: דף.html?src=https://link.com)
        const urlParams = new URLSearchParams(window.location.search);
        const imageSrc = urlParams.get('src'); // שם הפרמטר ב-URL הוא 'src'

        // 2. הגדרת הלינק הבסיסי של הטופס שלך
        const formId = "YOUR_FORM_ID"; // החלף כאן ב-ID של הטופס
        const tallyBaseUrl = `https://tally.so/r/${formId}`;
        
        const iframe = document.getElementById('tally-iframe');

        // 3. בניה של הלינק הסופי עם הפרמטר (אם הוא קיים)
        // שים לב: 'image_url' זה שם ה-Hidden Field שיצרת בטאלי
        if (imageSrc) {
            iframe.src = `${tallyBaseUrl}?image_url=${encodeURIComponent(imageSrc)}`;
        } else {
            iframe.src = tallyBaseUrl;
        }
    </script>
</body>
</html>
