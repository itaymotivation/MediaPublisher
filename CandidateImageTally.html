<!DOCTYPE html> 

<html lang="he" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://itaymotivation.github.io/MediaPublisher/ShiduchimIcon.jpg" type="image/png">
    <title>הצעה לשידוך</title>

    <style>

        * {

            box-sizing: border-box;

        }



        body, html { 

            margin: 0; 

            padding: 0; 

            width: 100%; 

            height: 100%; 

            display: flex; 

            flex-direction: column; 

            font-family: sans-serif; 

            overflow-x: hidden; 

        }

        

        /* אזור הכותרת מוצמד לראש הדף */

        #header-container {
            top: 0;

            z-index: 100; /* מוודא שזה מעל הכל */

            width: 100%;

            display: flex;

            flex-direction: column;

            align-items: center;

            background-color: #f9f9f9;

         /*   border-bottom: 2px solid #4f46e5;  קו הפרדה בצבע החדש */

            text-align: center;

            flex-shrink: 0;

        }



        #candidate-image {

            width: 100%; /* תופס את כל הרוחב */

            height: 250px; /* גובה קבוע לבאנר (אפשר לשנות) */

            object-fit: contain; /* פורס את התמונה יפה בלי עיוות */

            border-radius: 50%; /* מלבני */

            border-bottom: 4px solid #4f46e5; /* מסגרת תחתונה בלבד או מסגרת מלאה */

            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

            display: none; 

        }



        #candidate-details {

            font-size: 1.1rem;

            color: #333;

            font-weight: bold;

            margin-top: 10px;

        }



        #tally-iframe { 

            flex-grow: 1; 

            width: 100%; 

            border: none;

            display: block; 

        }

        @media (max-width: 480px) {
            #candidate-image {  object-fit: cover; border-radius: 0px 0px 25% 25%}
            #candidate-details { font-size: 1rem; }
        }

    </style>

</head>

<body>



    <div id="header-container">
        <img id="candidate-image" alt="תמונת מועמד">
       
        
    </div>

    <iframe id="tally-iframe"></iframe>



  <script>

const urlParams = new URLSearchParams(window.location.search);

const candidateImg = document.getElementById("candidate-image");
const iframe = document.getElementById("tally-iframe");

const matchId = urlParams.get("matchId");
const gender = urlParams.get("gender");

if (!matchId) {
    document.body.innerHTML = "<h2 style='text-align:center'>חסר MatchId</h2>";
    throw new Error("Missing matchId");
}

if (!gender) {
    document.body.innerHTML = "<h2 style='text-align:center'>חסר gender</h2>";
    throw new Error("Missing gender");
}


// פונקציית callback שאליה Apps Script יחזיר את הנתונים
window.receiveMatchData = function(data) {

    console.log("Match data:", data);

    if (!data.success) {
        document.body.innerHTML =
            "<h2 style='text-align:center'>לא נמצאה הצעה.</h2>";
        return;
    }


    // הצגת תמונה
    if (data.src && data.src.trim() !== "") {
        candidateImg.src = data.src;
        candidateImg.style.display = "block";
    }


    // בניית פרמטרים ל-Tally
    const tallyParams = new URLSearchParams();

    tallyParams.set("candidateName", data.candidateName || "");
    tallyParams.set("suggestionName", data.suggestionName || "");
    tallyParams.set("meetingNum", data.meetingNum || "0");
    tallyParams.set("matchId", data.matchId || "");
    tallyParams.set(
        "suggestionTelegramPost",
        data.suggestionTelegramPost || ""
    );

    if (data.src) {
        tallyParams.set("src", data.src);
    }


    // טעינת הטופס
    iframe.src =
        "https://tally.so/r/RGj87K?" + tallyParams.toString();


    // ניקוי
    delete window.receiveMatchData;
};


// יצירת script חיצוני (JSONP)
const script = document.createElement("script");

script.src =
    "https://script.google.com/macros/s/AKfycbzZ9nRxN3hl8VaUGT_RyYg0hhdD0S_3uKh9HMtw1mjGH4sliE6MchY_bTnaOmD30JMJ/exec"
    + "?action=getMatchData"
    + "&matchId=" + encodeURIComponent(matchId)
    + "&gender=" + encodeURIComponent(gender)
    + "&callback=receiveMatchData";


script.onerror = function() {
    console.error("שגיאה בקריאת השירות");
    document.body.innerHTML =
        "<h2 style='text-align:center'>אירעה שגיאה בטעינת ההצעה.</h2>";
};


// הפעלת הקריאה
document.body.appendChild(script);


</script>
</body>

</html>
