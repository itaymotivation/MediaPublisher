<!DOCTYPE html> 
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דף מועמד</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; display: flex; flex-direction: column; font-family: sans-serif; }
        
        /* אזור הכותרת הכולל את התמונה והפרטים */
        #header-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f9f9f9;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        #candidate-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #007bff;
            margin-bottom: 10px;
            display: none; /* מוסתר כברירת מחדל */
        }

        #candidate-details {
            font-size: 1.2rem;
            color: #333;
            font-weight: bold;
        }

        #tally-iframe { 
            flex-grow: 1; 
            width: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <div id="header-container">
        <img id="candidate-image" alt="תמונת מועמד">
       <div id="candidate-details"></div>
    </div>

    <iframe id="tally-iframe"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // 1. טיפול בתמונה
        const candidateImg = document.getElementById('candidate-image');
        if (urlParams.has('src')) {
            candidateImg.src = decodeURIComponent(urlParams.get('src'));
            candidateImg.style.display = 'block'; 
        }

        // 2. טיפול בפרטים (שם המועמד וכו')
        const detailsContainer = document.getElementById('candidate-details');
        const name = urlParams.get('candidateName');
        if (name) {
            detailsContainer.innerText = decodeURIComponent(name);
        }

        // 3. הגדרת ה-Iframe
        const tallyParams = new URLSearchParams();
        // העתקת כל הפרמטרים לטאלי
        urlParams.forEach((value, key) => {
            tallyParams.set(key, value);
        });
        
        const formId = "RGj87K";
        const iframe = document.getElementById('tally-iframe');
        iframe.src = `https://tally.so/r/${formId}?${tallyParams.toString()}`;
    </script>
</body>
</html>
