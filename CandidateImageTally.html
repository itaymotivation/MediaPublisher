<!DOCTYPE html> 
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דף מועמד</title>
    <style>
        * { box-sizing: border-box; }

        /* שינוי: במקום height 100% ו-hidden, נשתמש ב-min-height ואוטומטי */
        body, html { 
            margin: 0; 
            padding: 0; 
            min-height: 100%; 
            width: 100%;
            font-family: sans-serif; 
            overflow-y: auto; /* מאפשר גלילה לדף */
        }
        
        #header-container {
            /* הסרנו את ה-sticky */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f9f9f9;
            border-bottom: 2px solid #4f46e5;
            text-align: center;
            padding-bottom: 10px;
        }

        #candidate-image {
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 0; 
            border-bottom: 4px solid #4f46e5;
            display: none; 
        }

        #candidate-details {
            font-size: 1.1rem;
            color: #333;
            font-weight: bold;
            margin-top: 10px;
        }

        /* הגדרת גובה קבוע ל-iframe כדי שהדף יוכל לגלול אותו */
        #tally-iframe { 
            width: 100%; 
            height: 800px; /* גובה רצוי שניתן לגלול בתוכו */
            border: none;
            display: block; 
        }
    </style>
</head>
<body>

    <div id="header-container">
        <img id="candidate-image" alt="תמונת מועמד">
        <div id="candidate-details"></div>
    </div>

    <iframe id="tally-iframe"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        const candidateImg = document.getElementById('candidate-image');
        const detailsContainer = document.getElementById('candidate-details');
        const suggestionName = urlParams.get('suggestionName');
        
        if (urlParams.has('src')) {
            candidateImg.src = decodeURIComponent(urlParams.get('src'));
            candidateImg.style.display = 'block'; 
            
            if (suggestionName) {
                detailsContainer.innerText = "תמונת ההצעה ☝🏻";
            }
        }

        const tallyParams = new URLSearchParams();
        urlParams.forEach((value, key) => {
            tallyParams.set(key, value);
        });
        
        const formId = "RGj87K";
        const iframe = document.getElementById('tally-iframe');
        iframe.src = `https://tally.so/r/${formId}?${tallyParams.toString()}`;
    </script>
</body>
</html>
