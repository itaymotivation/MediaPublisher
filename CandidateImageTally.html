<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Image Loader</title>
    <style>
        /* איפוס הגדרות ברירת מחדל כדי שהתמונה תתפוס את כל המסך */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* רקע לבן, ניתן לשנות לכל צבע */
        }

        /* הגדרת התמונה כך שתמיד תתאים לגודל המסגרת */
        #dynamic-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain; /* שומר על פרופורציות מבלי לעוות */
        }
    </style>
</head>
<body>

    <img id="dynamic-image" src="" alt="Dynamic Content">

    <script>
        // פונקציה לשליפת ערך מתוך ה-URL לפי שם הפרמטר
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // שליפת הלינק מהפרמטר בשם 'src'
        const imageUrl = getQueryParam('src');
        
        // אם נמצא לינק, מעדכנים את מקור התמונה
        if (imageUrl) {
            const imgElement = document.getElementById('dynamic-image');
            imgElement.src = imageUrl;
        } else {
            console.error("לא נמצא פרמטר 'src' ב-URL.");
        }
    </script>
</body>
</html>
