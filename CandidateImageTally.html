<!DOCTYPE html> 
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הצעה לשידוך</title>
    <style>
        /* עיצוב כללי */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: #f4f4f9; 
            margin: 0;
        }
        
        .wrapper { 
            max-width: 600px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        /* עיצוב התמונה - ברירת מחדל (פלאפון) */
        .photo-frame { 
            width: 100%;           
            max-height: 400px; 
            object-fit: cover; 
            border-radius: 8px; /* מלבני עם פינות מעוגלות בפלאפון */
            margin-bottom: 20px; 
            border: 2px solid #ddd; 
            display: none; /* מוסתר בהתחלה עד שנטען */
        }

        /* עיצוב התמונה - מחשב */
        @media (min-width: 768px) {
            .photo-frame {
                width: 200px;         /* גודל קטן במחשב */
                height: 200px;        /* ריבוע */
                border-radius: 50%;   /* עיגול מושלם */
                margin: 0 auto 20px;  /* מרכוז */
                display: block;       /* מציג את התמונה */
            }
        }

        /* עיצוב ה-iframe */
        #tally-iframe { 
            width: 100%; 
            border: none; 
            min-height: 800px; /* גובה התחלתי לטופס */
        }
    </style>
</head>
<body>

    <div id="header-container">
        <img id="candidate-image" alt="תמונת מועמד">
        <div id="candidate-details"></div>
    </div>

    <iframe id="tally-iframe"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        const candidateImg = document.getElementById('candidate-image');
        const detailsContainer = document.getElementById('candidate-details');
        const suggestionName = urlParams.get('suggestionName');
        
        // טעינת תמונה
        if (urlParams.has('src')) {
            candidateImg.src = decodeURIComponent(urlParams.get('src'));
            candidateImg.style.display = 'block'; 
            
            if (suggestionName) {
                detailsContainer.innerText = "תמונת ההצעה ☝🏻";
            }
        }

        // טעינת הטופס
        const tallyParams = new URLSearchParams();
        urlParams.forEach((value, key) => {
            tallyParams.set(key, value);
        });
        
        const formId = "RGj87K";
        const iframe = document.getElementById('tally-iframe');
        iframe.src = `https://tally.so/r/${formId}?${tallyParams.toString()}`;
    </script>
</body>
</html>
