<!DOCTYPE html> 
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דף מועמד</title>
    <style>
        * { box-sizing: border-box; }

        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
        }
        
        /* אזור הכותרת נשאר דביק למעלה */
        #header-container {
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            border-bottom: 2px solid #4f46e5;
            text-align: center;
            flex-shrink: 0;
            padding-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #candidate-image {
            width: 100%;
            /* הגובה משתנה בהתאם למסך: מינימום 200px, גדל עד 350px במסכים גדולים */
            height: clamp(200px, 30vh, 350px);
            object-fit: cover;
            border-radius: 0;
            border-bottom: 3px solid #4f46e5;
            display: none; 
        }

        #candidate-details {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: #333;
            font-weight: bold;
            margin-top: 10px;
            padding: 0 15px;
        }

        #tally-iframe { 
            flex-grow: 1; 
            width: 100%; 
            border: none;
            display: block; 
        }

        /* התאמה למסכים קטנים מאוד */
        @media (max-width: 480px) {
            #header-container { padding-bottom: 5px; }
            #candidate-details { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="header-container">
        <img id="candidate-image" alt="תמונת מועמד">
        <div id="candidate-details"></div>
    </div>

    <iframe id="tally-iframe"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        const candidateImg = document.getElementById('candidate-image');
        const detailsContainer = document.getElementById('candidate-details');
        const suggestionName = urlParams.get('suggestionName');
        
        // טעינת תמונה
        if (urlParams.has('src')) {
            candidateImg.src = decodeURIComponent(urlParams.get('src'));
            candidateImg.style.display = 'block'; 
            
            if (suggestionName) {
                detailsContainer.innerText = "תמונת ההצעה: " + decodeURIComponent(suggestionName);
            }
        }

        // טעינת הטופס
        const tallyParams = new URLSearchParams();
        urlParams.forEach((value, key) => {
            tallyParams.set(key, value);
        });
        
        const formId = "RGj87K";
        const iframe = document.getElementById('tally-iframe');
        iframe.src = `https://tally.so/r/${formId}?${tallyParams.toString()}`;
    </script>
</body>
</html>
