<!DOCTYPE html> 
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דף מועמד</title>
    <style>
        body, html { margin: 0; padding: 0; min-height: 100%; width: 100%; font-family: sans-serif; }
        
        #header-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f9f9f9;
            border-bottom: 2px solid #4f46e5;
            text-align: center;
            padding-bottom: 10px;
        }

        #candidate-image {
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            display: none; 
        }

        #candidate-details { font-size: 1.1rem; color: #333; font-weight: bold; margin-top: 10px; }
        
        /* הסגנון של ה-Tally Embed */
        [data-tally-src] { width: 100%; border: none; }
    </style>
</head>
<body>

    <div id="header-container">
        <img id="candidate-image" alt="תמונת מועמד">
        <div id="candidate-details"></div>
    </div>

    <div id="tally-form-container" data-tally-src="https://tally.so/r/RGj87K" data-tally-width="100%" data-tally-align="left" data-tally-overlay="0"></div>

    <script async src="https://tally.so/widgets/embed.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // 1. הגדרת התמונה והפרטים (כמו קודם)
        const candidateImg = document.getElementById('candidate-image');
        const detailsContainer = document.getElementById('candidate-details');
        const suggestionName = urlParams.get('suggestionName');
        
        if (urlParams.has('src')) {
            candidateImg.src = decodeURIComponent(urlParams.get('src'));
            candidateImg.style.display = 'block'; 
            if (suggestionName) {
                detailsContainer.innerText = "תמונת ההצעה: " + decodeURIComponent(suggestionName);
            }
        }

        // 2. הזרקת הפרמטרים לסקריפט של Tally בצורה אוטומטית
        // אנחנו בונים את ה-URL המלא ומעדכנים את ה-Attribute של ה-div
        const container = document.getElementById('tally-form-container');
        const tallyParams = new URLSearchParams(urlParams);
        
        // עדכון ה-src עם הפרמטרים
        container.setAttribute('data-tally-src', `https://tally.so/r/RGj87K?${tallyParams.toString()}`);
    </script>
</body>
</html>
