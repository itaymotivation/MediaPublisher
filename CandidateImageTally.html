<!DOCTYPE html> 
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טופס דינמי</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #tally-iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="tally-iframe"></iframe>

    <script>
        // 1. קבלת המידע מה-URL (למשל: דף.html?src=https://link.com)
        const urlParams = new URLSearchParams(window.location.search);
        const tallyParams = new URLSearchParams();

        // העברת הפרמטרים ממה שהגיע ל-URL לתוך הטופס (עם מיפוי השמות הנכון לטאלי)
        if (urlParams.has('src')) tallyParams.set('image_url', urlParams.get('src'));
        if (urlParams.has('candidateName')) tallyParams.set('candidateName', urlParams.get('candidateName'));
        if (urlParams.has('suggestionName')) tallyParams.set('suggestionName', urlParams.get('suggestionName'));
        if (urlParams.has('meetingNum')) tallyParams.set('meetingNum', urlParams.get('meetingNum'));
        if (urlParams.has('matchId')) tallyParams.set('matchId', urlParams.get('matchId'));
        if (urlParams.has('suggestionTelegramPost')) tallyParams.set('suggestionTelegramPost', urlParams.get('suggestionTelegramPost'));
        
        // 2. הגדרת הלינק הבסיסי של הטופס שלך
        const formId = "RGj87K"; // החלף כאן ב-ID של הטופס
        const tallyBaseUrl = `https://tally.so/r/${formId}`;
        
        const iframe = document.getElementById('tally-iframe');

        // 3. בניה של הלינק הסופי עם הפרמטר (אם הוא קיים)
        // שים לב: 'image_url' זה שם ה-Hidden Field שיצרת בטאלי
        if (urlParams.has('suggestionTelegramPost')) {
            iframe.src = `${tallyBaseUrl}?${tallyParams.toString()}`;
        } else {
            iframe.src = tallyBaseUrl;
        }

        iframe.addEventListener('load', () => {
    try {
      // 1. Attempt to access the contentDocument
      const innerDoc = iframe.contentDocument || iframe.contentWindow.document;
      
      console.log("Iframe loaded. Attempting to observe...");

      // 2. Setup the Observer
      const observer = new MutationObserver((mutations) => {
        console.log("Changes detected inside iframe:", mutations);
      });

      // 3. This is the line that will throw the Security Error
      observer.observe(innerDoc.body, {
        childList: true,
        subtree: true
      });

    } catch (e) {
      // The browser will catch the SecurityError here
      console.error("CRITICAL: Access Denied due to Same-Origin Policy.");
      console.error("The browser prevented access to:", e.message);
    }
  });
    </script>
</body>
</html>
