<!DOCTYPE html> 

<html lang="he" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://itaymotivation.github.io/MediaPublisher/ShiduchimIcon.jpg" type="image/png">
    <title>הצעה לשידוך</title>

    <style>

        * {

            box-sizing: border-box;

        }



        body, html { 

            margin: 0; 

            padding: 0; 

            width: 100%; 

            height: 100%; 

            display: flex; 

            flex-direction: column; 

            font-family: sans-serif; 

            overflow-x: hidden; 

        }

        

        /* אזור הכותרת מוצמד לראש הדף */

        #header-container {
            top: 0;

            z-index: 100; /* מוודא שזה מעל הכל */

            width: 100%;

            display: flex;

            flex-direction: column;

            align-items: center;

            background-color: #f9f9f9;

         /*   border-bottom: 2px solid #4f46e5;  קו הפרדה בצבע החדש */

            text-align: center;

            flex-shrink: 0;

        }



        #candidate-image {

            width: 100%; /* תופס את כל הרוחב */

            height: 250px; /* גובה קבוע לבאנר (אפשר לשנות) */

            object-fit: contain; /* פורס את התמונה יפה בלי עיוות */

            border-radius: 50%; /* מלבני */

            border-bottom: 4px solid #b37b2d; /* מסגרת תחתונה בלבד או מסגרת מלאה */

            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

            display: none; 

        }



        #candidate-details {

            font-size: 1.1rem;

            color: #333;

            font-weight: bold;

            margin-top: 10px;

        }



        #tally-iframe { 

            flex-grow: 1; 

            width: 100%; 

            border: none;

            display: block; 
            
            min-height: -webkit-fill-available;
        }

        #candidate-telegramPost {
        white-space: pre-wrap;
        direction: rtl;
        width: min(800px, 95%);
        padding: 16px;
        margin: 12px 0;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,.08);
        font-size: 1rem;
        line-height: 1.8;
        word-break: break-word;
    }
    p{text-align: right;}
    #innerdiv{padding: 15px;}    
    @media (max-width: 480px) {
        #candidate-image {  object-fit: cover; border-radius: 0px 0px 25% 25%}
        #candidate-details { font-size: 1rem; }
    }

    </style>

</head>

<body>



    <div id="header-container">
        <h1>טופס אישור והתקדמות הצעה</h1>
        <img id="candidate-image" alt="תמונת מועמד">
        <div id="innerdiv">
            <p id="candidate-name" alt="שם מועמד"></p>
            <p id="suggestion-name" alt="שם הצעה"></p>
        </div>  
        <p id="candidate-telegramPost" alt="פרטי מועמד"></p>
        <iframe id="tally-iframe"></iframe>
    </div>

   



  <script>


const urlParams = new URLSearchParams(window.location.search);

const candidateImg = document.getElementById("candidate-image");

const iframe = document.getElementById("tally-iframe");


const matchId = urlParams.get("matchId");

const gender = urlParams.get("gender");



if (!matchId) {

    document.body.innerHTML =
    "<h2 style='text-align:center'>חסר MatchId</h2>";

    throw new Error("Missing matchId");

}


if (!gender) {

    document.body.innerHTML =
    "<h2 style='text-align:center'>חסר gender</h2>";

    throw new Error("Missing gender");

}



// Apps Script JSONP callback

window.receiveMatchData = function(data) {


    console.log("Match data:", data);


    if (!data.success) {

        document.body.innerHTML =
        "<h2 style='text-align:center'>בעיה בנתונים, יש לכתוב מייל לכתובת shiduchimt321@gmail.com</h2>";

        return;

    }

    const tallyParams = new URLSearchParams();

    var candidateName="";
    var suggestionName="";
    var meetingNum="";
    var suggestionTelegramPost="";
    var telegramPostText="";
    var src="";
    
    if(gender=="man"){
        candidateName = data.man.name;
        suggestionName = data.woman.name;
        suggestionTelegramPost = data.woman.telegramPost;
        src = data.woman.image;
    }else{
         candidateName = data.woman.name;
         suggestionName = data.man.name;
         suggestionTelegramPost =  data.man.telegramPost;
         src = data.man.image;
         document.getElementById("candidate-telegramPost").innerHTML=data.man.telegramPost;
    }
    document.getElementById("candidate-telegramPost").textContent=suggestionTelegramPost;
    document.getElementById("candidate-name").innerHTML= `${candidateName} שלום רב, בהמשך לתהליך השידוכים שלכם בנוגע להצעה.`;
    document.getElementById("suggestion-name").innerHTML= `שם ההצעה: ${suggestionName}`;
    meetingNum = data.man.meetingNum;
    
    tallyParams.set(
        "candidateName",
        candidateName || ""
    );


    tallyParams.set(
        "suggestionName",
        suggestionName || ""
    );


    tallyParams.set(
        "meetingNum",
        meetingNum || "0"
    );


    tallyParams.set(
        "matchId",
        matchId || ""
    );
    
    if (src && src.trim() !== "") {
        candidateImg.src = src;
        candidateImg.style.display = "block";
    }



    iframe.src =
    "https://tally.so/r/RGj87K?" +
    tallyParams.toString();



    delete window.receiveMatchData;


};




// JSONP call to Apps Script

const script = document.createElement("script");


script.src =

"https://script.google.com/macros/s/AKfycbzZ9nRxN3hl8VaUGT_RyYg0hhdD0S_3uKh9HMtw1mjGH4sliE6MchY_bTnaOmD30JMJ/exec"

+ "?action=doGet"

+ "&matchId=" + encodeURIComponent(matchId)

+ "&gender=" + encodeURIComponent(gender)

+ "&callback=receiveMatchData";




script.onload = function(){

    console.log(
        "Apps Script loaded successfully"
    );

};



script.onerror = function(){

    console.error(
        "Failed loading Apps Script"
    );

};



console.log(
    "Loading Apps Script URL:",
    script.src
);



// start request

document.body.appendChild(script);



</script>

</body>

</html>
