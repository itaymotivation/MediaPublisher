<!DOCTYPE html> 
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דף מועמד</title>
    <style>
        /* FIX: Reset margins and force borders to be included in width calculation */
        * {
            box-sizing: border-box;
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            font-family: sans-serif; 
            overflow-x: hidden; /* Prevents horizontal scrollbar */
        }
        
        #header-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f9f9f9;
            border-bottom: 1px solid #eee;
            text-align: center;
            flex-shrink: 0; /* Ensures the header doesn't get squashed */
        }

       #candidate-image {
            /* Increased dimensions for a larger, wider presence */
            width: 180px;
            height: 180px;
            
            /* Rounded to maintain the circle */
            border-radius: 50%;
            
            /* Maintains aspect ratio without distortion */
            object-fit: cover;
            
            /* Thicker border for better definition */
            border: 4px solid #007bff;
            
            /* Added drop shadow for depth and better visual "clearness" */
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            
            margin-bottom: 15px;
            display: none; 
        }

        #candidate-details {
            font-size: 1.2rem;
            color: #333;
            font-weight: bold;
        }

        #tally-iframe { 
            flex-grow: 1; 
            width: 100%; 
            border: none;
            display: block; /* Prevents ghost gaps under images/iframes */
        }
    </style>
</head>
<body>

    <div id="header-container">
        <img id="candidate-image" alt="תמונת מועמד">
        <div id="candidate-details"></div>
    </div>

    <iframe id="tally-iframe"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // 1. Image handling
        const candidateImg = document.getElementById('candidate-image');
        const detailsContainer = document.getElementById('candidate-details');
        const suggestionName = urlParams.get('suggestionName');
        
        if (urlParams.has('src')) {
            candidateImg.src = decodeURIComponent(urlParams.get('src'));
            candidateImg.style.display = 'block'; 
        }
         if (suggestionName) {
            detailsContainer.innerText = "תמונת ההצעה ☝🏻";
        }

        // 3. Iframe setup
        const tallyParams = new URLSearchParams();
        urlParams.forEach((value, key) => {
            tallyParams.set(key, value);
        });
        
        const formId = "RGj87K";
        const iframe = document.getElementById('tally-iframe');
        iframe.src = `https://tally.so/r/${formId}?${tallyParams.toString()}`;
    </script>
</body>
</html>
