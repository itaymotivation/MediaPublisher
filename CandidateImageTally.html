<!DOCTYPE html> 

<html lang="he" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://itaymotivation.github.io/MediaPublisher/ShiduchimIcon.jpg" type="image/png">
    <title>הצעה לשידוך</title>

    <style>

        * {

            box-sizing: border-box;

        }



        body, html { 

            margin: 0; 

            padding: 0; 

            width: 100%; 

            height: 100%; 

            display: flex; 

            flex-direction: column; 

            font-family: sans-serif; 

            overflow-x: hidden; 

        }

        

        /* אזור הכותרת מוצמד לראש הדף */

        #header-container {
            top: 0;

            z-index: 100; /* מוודא שזה מעל הכל */

            width: 100%;

            display: flex;

            flex-direction: column;

            align-items: center;

            background-color: #f9f9f9;

            border-bottom: 2px solid #4f46e5; /* קו הפרדה בצבע החדש */

            text-align: center;

            flex-shrink: 0;

        }



        #candidate-image {

            width: 100%; /* תופס את כל הרוחב */

            height: 250px; /* גובה קבוע לבאנר (אפשר לשנות) */

            object-fit: contain; /* פורס את התמונה יפה בלי עיוות */

            border-radius: 50%; /* מלבני */

            border-bottom: 4px solid #4f46e5; /* מסגרת תחתונה בלבד או מסגרת מלאה */

            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

            display: none; 

        }



        #candidate-details {

            font-size: 1.1rem;

            color: #333;

            font-weight: bold;

            margin-top: 10px;

        }



        #tally-iframe { 

            flex-grow: 1; 

            width: 100%; 

            border: none;

            display: block; 

        }

        @media (max-width: 480px) {
            #candidate-image {  object-fit: cover; border-radius: 0px 0px 40% 40%}
            #candidate-details { font-size: 1rem; }
        }

    </style>

</head>

<body>



    <div id="header-container">
        <img id="candidate-image" alt="תמונת מועמד">
        <div id="candidate-details"></div>
        
    </div>

    <iframe id="tally-iframe"></iframe>



    <script>

        const urlParams = new URLSearchParams(window.location.search);

        const candidateImg = document.getElementById('candidate-image');

        const detailsContainer = document.getElementById('candidate-details');

        const suggestionName = urlParams.get('suggestionName');

        

        // טיפול בתמונה - עכשיו כבאנר

        if (urlParams.has('src')) {

            candidateImg.src = decodeURIComponent(urlParams.get('src'));

            candidateImg.style.display = 'block'; 

            

            if (suggestionName) {

                detailsContainer.innerText = "תמונת ההצעה ☝🏻";

            }

        }



        // הגדרת ה-Iframe

        const tallyParams = new URLSearchParams();

        urlParams.forEach((value, key) => {

            tallyParams.set(key, value);

        });

        

        const formId = "RGj87K";

        const iframe = document.getElementById('tally-iframe');

        iframe.src = `https://tally.so/r/${formId}?${tallyParams.toString()}`;

    </script>

</body>

</html>
