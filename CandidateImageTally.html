<!DOCTYPE html> 
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טופס דינמי עם תמונה</title>
    <style>
        /* הגדרות בסיסיות למסך מלא */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            font-family: Arial, sans-serif; 
        }
        
        /* אזור התמונה */
        #candidate-header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0;
            background-color: #f4f4f4; /* רקע עדין */
            border-bottom: 1px solid #ddd;
        }

        #candidate-image {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* תמונה עגולה */
            object-fit: cover; /* מתיחת התמונה בצורה יפה */
            border: 3px solid #007bff; /* מסגרת כחולה */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* צל עדין */
            display: none; /* מסתיר את התמונה אם אין מקור */
        }

        /* אזור ה-iframe - תופס את יתרת הגובה */
        #tally-iframe { 
            flex-grow: 1; /* לוקח את כל הגובה הנותר */
            width: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <div id="candidate-header">
        <img id="candidate-image" alt="תמונת מועמד">
    </div>

    <iframe id="tally-iframe"></iframe>

    <script>
        // 1. קבלת המידע מה-URL (של דף האב)
        const urlParams = new URLSearchParams(window.location.search);
        
        // --- קטע חדש: טיפול בתמונה --- //
        const candidateImg = document.getElementById('candidate-image');
        
        // בדיקה האם קיים פרמטר 'src' עבור התמונה
        if (urlParams.has('src')) {
            // פענוח של כתובת התמונה (במידה והיא מקודדת ב-URL)
            const decodedImgUrl = decodeURIComponent(urlParams.get('src'));
            
            // הגדרת כתובת התמונה והצגת האלמנט
            candidateImg.src = decodedImgUrl;
            candidateImg.style.display = 'block'; 
        }
        // ------------------------------ //

        const tallyParams = new URLSearchParams();

        // העברת הפרמטרים ממה שהגיע ל-URL לתוך הטופס (עם מיפוי השמות הנכון לטאלי)
        if (urlParams.has('src')) tallyParams.set('image_url', urlParams.get('src'));
        if (urlParams.has('candidateName')) tallyParams.set('candidateName', urlParams.get('candidateName'));
        if (urlParams.has('suggestionName')) tallyParams.set('suggestionName', urlParams.get('suggestionName'));
        if (urlParams.has('meetingNum')) tallyParams.set('meetingNum', urlParams.get('meetingNum'));
        if (urlParams.has('matchId')) tallyParams.set('matchId', urlParams.get('matchId'));
        if (urlParams.has('suggestionTelegramPost')) tallyParams.set('suggestionTelegramPost', urlParams.get('suggestionTelegramPost'));
        
        // 2. הגדרת הלינק הבסיסי של הטופס שלך
        const formId = "RGj87K"; // החלף כאן ב-ID של הטופס
        const tallyBaseUrl = `https://tally.so/r/${formId}`;
        
        const iframe = document.getElementById('tally-iframe');

        // 3. בניה של הלינק הסופי עם הפרמטר (אם הוא קיים)
        // שים לב: תנאי המקור המקורי נשמר
        if (urlParams.has('suggestionTelegramPost')) {
            iframe.src = `${tallyBaseUrl}?${tallyParams.toString()}`;
        } else {
            iframe.src = tallyBaseUrl;
        }
    </script>
</body>
</html>
